    *{box-sizing:border-box}

      margin:0;

      padding:20px;
    }

    h1{margin:0;font-size:28px;letter-spacing:.3px}
    .sub{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.6}

    .toolbar{
      margin-top:16px;
      display:grid;
      gap:10px;
      grid-template-columns:1.2fr .9fr .9fr 1.2fr auto;
    }
    .glass{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:16px;
      backdrop-filter: blur(8px);
      box-shadow:var(--shadow);
    }
    .field{padding:12px 14px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field button{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.2);
      color:var(--text);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    /* 修复下拉框选项在部分系统中默认白底白字的问题 */
    .field select option { background-color: var(--bg2); color: #fff; }
    
    .field button{cursor:pointer;background:linear-gradient(180deg,#7ec0ff,#5ca0ff);border:none;color:#fff;font-weight:700}
    .field button:disabled{opacity:.5;cursor:not-allowed}

    .status{margin-top:10px;color:var(--muted);font-size:13px}

    .section-title{margin:20px 0 10px;font-size:18px}

    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--stroke);font-size:12px;color:var(--muted)}

    .china-grid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    }
    .city-card{padding:14px}
    .city-name{font-weight:700;font-size:15px}
    .city-en{font-size:12px;color:var(--muted)}
    .now{display:flex;align-items:end;gap:10px;margin-top:8px}
    .temp{font-size:34px;line-height:1;font-weight:800}
    .feel{color:var(--muted);font-size:13px}
    .mini{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}

    /* 优化表格移动端浏览体验：支持水平滚动并锁定头部和左侧 */
    .compare-table-wrap{
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      margin-bottom:15px;
    }
    table{width:100%;border-collapse:collapse;min-width:640px;white-space:nowrap}
    th,td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.12);text-align:left;font-size:13px}
    th{color:#c8d9ff;font-weight:700;background:rgba(255,255,255,.05);position:sticky;top:0;z-index:2}
    @media (max-width: 660px) {
      .compare-table-wrap { box-shadow: inset -10px 0 15px -10px rgba(0,0,0,.5); }
      th:nth-child(2), td:nth-child(2) {
        position: sticky;
        left: 0;
        background: var(--bg2);
        z-index: 1;
        box-shadow: 2px 0 8px rgba(0,0,0,.2);
      }
      th:nth-child(2) { z-index: 3; }
      th:first-child, td:first-child { display: none; } /* 手机版隐藏独立的Rank列以省空间，靠名字辨识 */
    }
    .delta-hot{color:var(--warm);font-weight:700}
    .delta-cold{color:var(--cold);font-weight:700}

    .schools-grid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      margin-top:10px;
    }
    .school-card{padding:14px;display:flex;flex-direction:column;gap:8px}
    .head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .rank{font-size:12px;color:#d6e6ff;background:rgba(121,184,255,.2);border:1px solid rgba(121,184,255,.45);border-radius:999px;padding:3px 8px;white-space:nowrap}
    .name{font-weight:700;font-size:15px;line-height:1.35}
    .town{font-size:12px;color:var(--muted)}

    .metric{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px}
    .metric .k{font-size:11px;color:var(--muted)}

    }

    const WEATHER_MAP = {
      0:'晴',1:'大部分晴朗',2:'局部多云',3:'阴天',45:'有雾',48:'冻雾',
      51:'小毛毛雨',53:'毛毛雨',55:'大毛毛雨',56:'小冻毛毛雨',57:'大冻毛毛雨',
      61:'小雨',63:'中雨',65:'大雨',66:'小冻雨',67:'大冻雨',
      71:'小雪',73:'中雪',75:'大雪',77:'雪粒',
      80:'小阵雨',81:'阵雨',82:'强阵雨',85:'小阵雪',86:'大阵雪',
      95:'雷阵雨',96:'雷阵雨伴有冰雹',99:'强雷阵雨伴有冰雹'
    };

    const state = {
      chinaData: new Map(),
      schoolData: [],
      compareId: 'shanghai',
      search: '',

    };

    const $ = (id) => document.getElementById(id);

    function fmt(v){ return Number.isFinite(v) ? `${Math.round(v)}°C` : '—'; }
    function avg(nums){ const a = nums.filter(Number.isFinite); return a.length ? a.reduce((s,n)=>s+n,0)/a.length : NaN; }

    function weekRangeText(){
      const end = new Date();
      const start = new Date(end);
      start.setDate(end.getDate()-6);
      const f = d => `${d.getMonth()+1}/${d.getDate()}`;
      return `${f(start)} - ${f(end)} (近7天含今日)`;
    }

    function sparkline(values){
      const v = values.filter(Number.isFinite);
      if (!v.length) return '';
      const min = Math.min(...v), max = Math.max(...v);
      const spread = Math.max(max-min, 1);
      const w = 240, h = 48; // 增加图表高度避开裁剪
      let maxI = -1, minI = -1;
      
      const ptsObj = values.map((n,i)=>{
        const x = (i/(values.length-1||1))*w;
        const y = Number.isFinite(n) ? (h - 16) - ((n-min)/spread)*(h - 32) : h/2;
        if(n === max && maxI === -1) maxI = i;
        if(n === min && minI === -1) minI = i;
        return {x, y, n};
      });
      const ptsStr = ptsObj.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

      let labels = '';
      if(maxI !== -1) {
        let align = maxI === 0 ? 'start' : (maxI === values.length-1 ? 'end' : 'middle');
        labels += `<text x="${ptsObj[maxI].x}" y="${ptsObj[maxI].y - 5}" fill="var(--warm)" font-size="11" font-weight="bold" text-anchor="${align}">${Math.round(max)}°</text>`;
      }
      if(minI !== -1 && minI !== maxI) {
        let align = minI === 0 ? 'start' : (minI === values.length-1 ? 'end' : 'middle');
        labels += `<text x="${ptsObj[minI].x}" y="${ptsObj[minI].y + 12}" fill="var(--cold)" font-size="11" font-weight="bold" text-anchor="${align}">${Math.round(min)}°</text>`;
      }

      return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:48px;width:100%;margin-top:6px;overflow:visible;">
        <polyline fill="none" stroke="#8bd3ff" stroke-width="2.5" stroke-linejoin="round" points="${ptsStr}"/>
        ${labels}
      </svg>`;
    }

    async function fetchWeather(lat, lon){
      const url = new URL('https://api.open-meteo.com/v1/forecast');
      url.searchParams.set('latitude', lat);
      url.searchParams.set('longitude', lon);
      url.searchParams.set('timezone', 'auto');
      url.searchParams.set('temperature_unit', 'celsius');
      url.searchParams.set('past_days', '6');  // 过去6天 + forecast_days:1 (今天) = 7天数据。
      url.searchParams.set('forecast_days', '1');
      url.searchParams.set('current', 'temperature_2m,apparent_temperature,weather_code');
      url.searchParams.set('daily', 'temperature_2m_max,temperature_2m_min,temperature_2m_mean,apparent_temperature_max,apparent_temperature_min,weather_code');

      const r = await fetch(url);
      if(!r.ok) throw new Error(`API Error ${r.status}`);
      const j = await r.json();

      const highs = j?.daily?.temperature_2m_max || [];
      const lows = j?.daily?.temperature_2m_min || [];
      const means = j?.daily?.temperature_2m_mean || [];
      const feelHighs = j?.daily?.apparent_temperature_max || [];
      const feelLows = j?.daily?.apparent_temperature_min || [];
      const dailyCodes = j?.daily?.weather_code || [];
      const dates = j?.daily?.time || [];
      
      let sunny=0, cloud=0, rain=0, snow=0;
      dailyCodes.forEach(c => {
        if([0,1].includes(c)) sunny++;
        else if([2,3,45,48].includes(c)) cloud++;
        else if([71,73,75,77,85,86].includes(c)) snow++;
        else rain++;
      });

      const hottestIdx = highs.reduce((m,v,i,a)=> Number.isFinite(v) && (m<0 || v>a[m]) ? i : m, -1);
      const coldestIdx = lows.reduce((m,v,i,a)=> Number.isFinite(v) && (m<0 || v<a[m]) ? i : m, -1);

      return {
        nowTemp: j?.current?.temperature_2m,
        nowFeels: j?.current?.apparent_temperature,
        nowCode: j?.current?.weather_code,
        avgTemp: avg(means),
        avgHigh: avg(highs),
        avgLow: avg(lows),
        avgFeelHigh: avg(feelHighs),
        avgFeelLow: avg(feelLows),
        highs, lows, means, feelHighs, feelLows, dates,
        weatherCounts: { sunny, cloud, rain, snow },
        hottestDay: hottestIdx >=0 ? { date: dates[hottestIdx], value: highs[hottestIdx] } : null,
        coldestDay: coldestIdx >=0 ? { date: dates[coldestIdx], value: lows[coldestIdx] } : null
      };
    }

    async function runConcurrency(items, processFn, limit=6){
      const results = new Array(items.length);
      let i = 0;
      async function worker(){
        while(i < items.length){
          const currentIndex = i++;
          results[currentIndex] = await processFn(items[currentIndex]);
        }
      }
      await Promise.all(Array.from({length: Math.min(limit, items.length)}, worker));
      return results;
    }

    function renderChina(){
      const grid = $('chinaGrid');

      CHINA_CITIES.forEach(c=>{
        const d = state.chinaData.get(c.id);

          <div class="now">
            <div class="temp">${fmt(d?.nowTemp)}</div>

          <div class="mini" style="margin-top:8px;background:rgba(255,255,255,.04);padding:6px;border-radius:6px;border:1px solid var(--stroke);">
            过去7天：☀️晴 ${d?.weatherCounts?.sunny||0} | ☁️阴 ${d?.weatherCounts?.cloud||0} | 🌧️雨 ${d?.weatherCounts?.rain||0} | ❄️雪 ${d?.weatherCounts?.snow||0}
          </div>
          <div class="mini">一周平均温度：${fmt(d?.avgTemp)}</div>
          <div class="mini">均高/均低：${fmt(d?.avgHigh)} / ${fmt(d?.avgLow)}</div>

          ${sparkline(d?.highs||[])}
        `;
        grid.appendChild(card);
      });
    }

    function renderCompareTable(rows){
      const tbody = $('compareBody');
      const base = state.chinaData.get(state.compareId);
      tbody.innerHTML = '';
      rows.forEach(r=>{
        const delta = Number.isFinite(r.data.nowFeels) && Number.isFinite(base?.nowFeels)
          ? r.data.nowFeels - base.nowFeels
          : NaN;
        let deltaHtml = '—';
        if (Number.isFinite(delta)) {
          const sign = delta > 0 ? '+' : '';
          const cls = delta > 0 ? 'delta-hot' : (delta < 0 ? 'delta-cold' : '');
          deltaHtml = `<span class="${cls}">${sign}${Math.round(delta)}°C</span>`;
        }
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.rank}</td>
          <td><b>${r.college}</b><br><span style="color:var(--muted);font-size:12px;">${r.town}</span></td>
          <td style="font-size:15px;font-weight:700;">${fmt(r.data.nowTemp)}</td>
          <td>${fmt(r.data.nowFeels)}</td>
          <td>${deltaHtml}</td>
          <td>${fmt(r.data.avgTemp)} (高${fmt(r.data.avgHigh)}/低${fmt(r.data.avgLow)})</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderSchoolCards(rows){
      const wrap = $('schoolsGrid');
      wrap.innerHTML = '';
      rows.forEach(r=>{
        const d = r.data;
        const hot = d.hottestDay ? `${d.hottestDay.date.slice(5)}  (${fmt(d.hottestDay.value)})` : '—';
        const cold = d.coldestDay ? `${d.coldestDay.date.slice(5)}  (${fmt(d.coldestDay.value)})` : '—';

        const base = state.chinaData.get(state.compareId);
        const delta = Number.isFinite(d.nowFeels) && Number.isFinite(base?.nowFeels) ? d.nowFeels - base.nowFeels : NaN;
        let diffStr = '';
        if(Number.isFinite(delta)){
          const cName = CHINA_CITIES.find(c=>c.id===state.compareId)?.name || '对照城市';
          if(delta > 0) diffStr = `<span style="color:var(--warm)">比${cName}热 ${Math.round(delta)}°</span>`;
          else if(delta < 0) diffStr = `<span style="color:var(--cold)">比${cName}冷 ${Math.abs(Math.round(delta))}°</span>`;
          else diffStr = `与${cName}体感相同`;
        }

        const card = document.createElement('article');
        card.className = 'school-card glass';
        card.innerHTML = `
          <div class="head">
            <div>
              <div class="name">${r.college}</div>
              <div class="town">${r.town}</div>
            </div>
            <div class="rank">#${r.rank}</div>
          </div>
          <div class="now" style="justify-content:space-between">
            <div style="display:flex;align-items:end;gap:10px;">
              <div class="temp">${fmt(d.nowTemp)}</div>
              <div class="feel">体感 ${fmt(d.nowFeels)}<br>${WEATHER_MAP[d.nowCode]||'--'}</div>
            </div>
            <div style="font-size:12px;text-align:right;">${diffStr}</div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="k">近7日平均气温</div><div class="v" style="font-size:16px;">${fmt(d.avgTemp)}</div></div>
            <div class="metric"><div class="k">近7日均高 / 均低</div><div class="v">${fmt(d.avgHigh)} / ${fmt(d.avgLow)}</div></div>
            <div class="metric"><div class="k">近7日体感高 / 低</div><div class="v">${fmt(d.avgFeelHigh)} / ${fmt(d.avgFeelLow)}</div></div>
            <div class="metric"><div class="k">本周最高</div><div class="v">${hot}</div></div>
            <div class="metric"><div class="k">本周最低</div><div class="v">${cold}</div></div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:8px;background:rgba(255,255,255,.04);padding:6px;border-radius:8px;border:1px solid var(--stroke);text-align:center;">
            过去7天：☀️ 晴 ${d.weatherCounts.sunny} / ☁️ 阴 ${d.weatherCounts.cloud} / 🌧️ 雨 ${d.weatherCounts.rain} / ❄️ 雪 ${d.weatherCounts.snow}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;">过去7天最高温曲线：</div>
          ${sparkline(d.highs||[])}
        `;
        wrap.appendChild(card);
      });
    }

    function applyFiltersRender(){
      const base = state.chinaData.get(state.compareId);
      const q = state.search.trim().toLowerCase();

      let rows = state.schoolData.filter(r => 
        !q || r.college.toLowerCase().includes(q) || r.town.toLowerCase().includes(q)
      );

      rows.sort((a,b)=>{
        if(state.sortBy==='rank') return a.rank - b.rank;

        const aFeelValid = Number.isFinite(a.data.nowFeels);
        const bFeelValid = Number.isFinite(b.data.nowFeels);
        const aAvgValid = Number.isFinite(a.data.avgTemp);
        const bAvgValid = Number.isFinite(b.data.avgTemp);

        if(state.sortBy==='feels_desc') {
          if(!aFeelValid && !bFeelValid) return 0;
          if(!aFeelValid) return 1;
          if(!bFeelValid) return -1;
          return b.data.nowFeels - a.data.nowFeels;
        }
        
        if(state.sortBy==='avg_temp_desc') {
          if(!aAvgValid && !bAvgValid) return 0;
          if(!aAvgValid) return 1;
          if(!bAvgValid) return -1;
          return b.data.avgTemp - a.data.avgTemp;
        }
        
        if(state.sortBy.startsWith('delta_compare')){
          const baseValid = Number.isFinite(base?.nowFeels);
          const daValid = aFeelValid && baseValid;
          const dbValid = bFeelValid && baseValid;
          
          if(!daValid && !dbValid) return 0;
          if(!daValid) return 1;  // 无效数据排在最后
          if(!dbValid) return -1; // 无效数据排在最后
          
          const da = a.data.nowFeels - base.nowFeels;
          const db = b.data.nowFeels - base.nowFeels;
          
          if(state.sortBy==='delta_compare_desc') return db - da; // 热到冷
          if(state.sortBy==='delta_compare_asc') return da - db;  // 冷到热
        }
        return a.rank - b.rank;
      });

      renderCompareTable(rows);
      renderSchoolCards(rows);
      
      const el = $('quickStats');
      const feelVals = rows.map(r=>r.data.nowFeels).filter(Number.isFinite);
      const avgFeel = avg(feelVals);
      const hotterCount = rows.filter(r=> Number.isFinite(r.data.nowFeels) && Number.isFinite(base?.nowFeels) && r.data.nowFeels > base.nowFeels).length;
      const colderCount = rows.filter(r=> Number.isFinite(r.data.nowFeels) && Number.isFinite(base?.nowFeels) && r.data.nowFeels < base.nowFeels).length;

      el.innerHTML = `
        <span class="chip">符合条件的学校：${rows.length}</span>
        <span class="chip">LAC 平均体感：${fmt(avgFeel)}</span>
        <span class="chip" style="color:var(--warm);border-color:var(--warm)">比 对照城市 更暖：${hotterCount} 所</span>
        <span class="chip" style="color:var(--cold);border-color:var(--cold)">比 对照城市 更冷：${colderCount} 所</span>
      `;
    }

    async function loadData(){
      const statusEl = $('status');
      $('refreshBtn').disabled = true;
      statusEl.textContent = '正在从 Open-Meteo 拉取各地实时气象数据...';
      $('weekRange').value = weekRangeText();

      try{
        let count = 0;
        const total = CHINA_CITIES.length + LAC_COLLEGES.length;

        const chinaRes = await runConcurrency(CHINA_CITIES, async (c)=>{
          const data = await fetchWeather(c.lat, c.lon);
          count++; statusEl.textContent = `拉取进度: ${count} / ${total}`;
          return { id:c.id, data };
        }, 5);
        chinaRes.forEach(x=> state.chinaData.set(x.id, x.data));

        const schoolRes = await runConcurrency(LAC_COLLEGES, async (s)=>{
          const data = await fetchWeather(s.lat, s.lon);
          count++; statusEl.textContent = `拉取进度: ${count} / ${total}`;
          return { ...s, data };
        }, 8);
        state.schoolData = schoolRes;

        renderChina();
        applyFiltersRender();

        statusEl.textContent = `数据拉取完成。最后更新：${new Date().toLocaleTimeString()}`;
      }catch(e){
        console.error(e);
        statusEl.textContent = `数据拉取失败：${e.message}`;
      }finally{
        $('refreshBtn').disabled = false;
      }
    }

    function init(){
      const sel = $('compareCity');
      sel.innerHTML = CHINA_CITIES.map(c=>`<option value="${c.id}" ${c.id==='shanghai'?'selected':''}>${c.name} (${c.en})</option>`).join('');

      sel.addEventListener('change', ()=>{ state.compareId = sel.value; applyFiltersRender(); });
      $('searchInput').addEventListener('input', (e)=>{ state.search = e.target.value; applyFiltersRender(); });
      $('sortBy').addEventListener('change', (e)=>{ state.sortBy = e.target.value; applyFiltersRender(); });
      $('refreshBtn').addEventListener('click', loadData);
    }

    init();
    loadData();
  </script>
</body>
</html>
